<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Jam Clicker</title>
  <link rel="stylesheet" href="Game.css">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <link rel="icon" href="favicon.ico">
</head>
<body>

  <div id="points">0₹</div>
  
  <div id="containerDiv">
    <div class="donut"></div>
    <div class="donut2"></div>
    <div class="top"></div>
    <div class="bottom"></div>
    <div class="right"></div>
    <div class="left"></div>
    <div class="poll1"></div>
    <div class="poll2"></div>

    <div id="shopDiv"></div>
    <div id="itemsDiv"></div>

    <div class="badge-container">
      <div class="award-badge">
        <img id="trophy" draggable="false" src="../images/trophy.png">
        <button id="openBtn1"></button>
      </div>
    </div>

    <div id="popupOverlay" class="hidden">
      <div id="popup-box">
        <h2>Achievements:</h2>
        <div id="Ach1"> <img id="imge1" draggable="false" src="../images/trophy.png"></img> Reach score of 1,000</div>
        <div id="Ach2"> <img id="imge2" draggable="false" src="../images/trophy.png"></img> Reach score of 10,000</div>
        <div id="Ach3"> <img id="imge3" draggable="false" src="../images/trophy.png"></img> Reach score of 100,000</div>
        <div id="Ach4"> <img id="imge4" draggable="false" src="../images/trophy.png"></img> Reach score of 1,000,000</div>
        <button id="closeBtn1">Close</button>
      </div>
    </div>

    <div class="profile-container">
      <div class="user-page">
        <img id="profile" draggable="false" src="../images/profile.png">
        <button id="openBtn2"></button>
      </div>
    </div>

    <div id="profileOverlay" class="hidden">
      <div id="profilePopup">

        <button id="closeProfileBtn">✕</button>

        <div id="profileHeader">
          <img id="profilePicture" src="../images/profile.png" draggable="false">

          <div id="profileInfo">
            <h3 id="profileName">Hello, Your Name</h3>
          </div>
        </div>

        <div class="profileRow">
            <span>Name</span>
            <div id="usernameDisplay">Unknown Player</div>
        </div>

        <div class="profileRow">
            <span>Password</span>
            <div id="passwordDisplay">No password?</div>
        </div>

        <div class="profileRow">
            <span>Location</span>

            <select id="locationSelect">
                <option value="NoCountry">------------------------</option>
                <option value="Australia">Australia 🇦🇺</option>              
                <option value="Canada">Canada 🇨🇦</option>
                <option value="France">France 🇫🇷</option>
                <option value="Germany">Germany 🇩🇪</option>
                <option value="Israel">Israel 🇮🇱</option>
                <option value="Japan">Japan 🇯🇵</option>
                <option value="United Kingdom">United Kingdom 🇬🇧</option>
                <option value="USA">USA 🇺🇸</option>


            </select>
        </div>

        <button id="logoutBtn">Log Out</button>

      </div>
    </div>

    <div id="jamDiv">
      <div id="jamMiddleDiv">
        <div class="orbit-wrapper">
          <img id="jamImg" draggable="false" src="../images/BigJam.png">
        </div>
      </div>
      </div>

    <img id="jamstand" draggable="false" src="../images/JamStand.png">
    <button id="Shop">Store</button>

    <img id="toolstand" draggable="false" src="../images/Upgrades.png">
    <button id="Upgrades">Upgrades</button>
  </div>

  <div class="ui-container">
    
    <div class="info-section">
      <div class="avatar-badge"></div>
      <div class="text-content">
        <div class="title">1000X clicks - GamePass</div>
        <div class="description">Each click will give you 1000X more jams👀👀👀👀👀<br>Dope!</div>
      </div>
    </div>
    
    <div class="price-button">
      <span class="cost-amount">999$</span>

    </div>
  </div>
      <div id="deal">50% OFF!</div>

  <audio id="click-sound" src="../sounds/click.wav" preload="auto"></audio>

  <script type="module" src="Game.js"></script>
</body>
</html>
