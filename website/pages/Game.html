<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Jam Clicker</title>

  <link rel="stylesheet" href="Game.css">
  <link rel="icon" sec="../images/icon.png" href="favicon.ico">

  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
</head>

<body>

  <div id="points">Jams: 0</div>
  <div id="containerDiv">
    <div class="donut"></div>
    <div class="donut2"></div>
    <div class="top"></div>
    <div class="bottom"></div>
    <div class="right"></div>
    <div class="left"></div>
    <div class="poll1"></div>
    <div class="poll2"></div>

    <div id="shopDiv"></div>
    
    <div id="itemsDiv"></div>

    <div id="jamDiv">
      <div id="jamMiddleDiv">
        <div class="orbit-wrapper">
          <img id="jamImg" draggable="false" src="../images/BigJam.png">
        </div>
      </div>
    </div>



    <img id="jamstand" draggable="false" src="../images/JamStand.png">
    <button id="Shop">Store</button>

    <img id="toolstand" draggable="false" src="../images/Upgrades.png">
    <button id="Upgrades">Upgrades</button>
  </div>

  <audio id="click-sound" src="../sounds/click.wav" preload="auto"></audio>

  <script type="module" src="Game.js"></script>
</body>

</html>
