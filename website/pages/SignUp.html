<meta charset="UTF-8">
<!DOCTYPE html>

<html>

<head>
  <title>Jam clicker</title>
  <link rel="stylesheet" href="SignUp.css">
  <link rel="icon" type="image/png" href="../images/icon.png">
  <link rel="icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

</head>

<body>
  <div id="containerDiv">
    <div class="block"></div>
    <div id="Si"><strong>Sign Up</strong></div>


    <div class="password-container1">
      <input type="text" id="UserName" autocomplete="off" placeholder="Username:">
      <div class="box1">
        <img id="User" src="../images/user.png">
      </div>

    </div>


    <div class="password-container2">
      <input type="password" id="PassWord" autocomplete="off" placeholder="Password:">
      <div class="box2">
        <img id="User" src="../images/password.png">
      </div>

      <button type="button" id="togglePassword" class="eye-btn">╱</button>
      <div class="eye">👁</div>

    </div>


    <div class="password-container3">
      <input type="password" id="ConfirmPassWord" autocomplete="off" placeholder="Re-type Password:">
      <div class="box3">
        <img id="User" src="../images/password.png">
      </div>

      <button type="button" id="togglePassword2" class="eye-btn2">╱</button>
      <div class="eye2">👁</div>

    </div>


    <div id="ErrorDiv"></div>
    <div class="box4"></div>
    <div class="box5"></div>
    <div class="box6"></div>
  
  </div>
  <div id="containerDiv1">
     <button type="button" id="Button1">Sign Up</button> 
     <div id="exist">Already have an existing account?</div>
     <a id="Link" href="SignIn.html">
      Login now
     </a>
  </div>
 
  <button class="back-btn" id="backButton">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="back-icon" style="width: 24px; height: 24px;">
      <path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/>
    </svg>
    <span class="back-text">Back</span>
  </button>  
  
</body>

<script type="module" src="SignUp.js"></script>

</html>
