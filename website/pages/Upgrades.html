<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <title>Jam clicker</title>
  <link rel="stylesheet" href="Upgrades.css">
  <link rel="icon" type="image/x-icon" href="favicon.ico">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

</head>

<body>

<div id="score-container">
      <span id="points" >0₹</span>
    </div>

  <div class="containerDiv1">
    <div id="Backround1">
      <div id="Backround2">
        
        <div id="cell0" class="cell">
          <div id="Item1" class="cell1" style=>
            <div id="Cavior">
              <img id="img1" draggable="false" src="../images/cursor.png" alt="cursor">
              <div id="item-name1">Double Tap</div> 
            </div>
            <div id="Info1">Now after every click, you will gain as twice more.</div>
            <div id="Cover1" class="not-enough-points"> 
              <div id="Stand1"></div> 
              <button id="buy1">BUY</button> 
              <div id="Price1" >150₹</div> 
            </div>
          </div>

          <div id="Item2" class="cell1" style="background-color: rgba(0, 255, 55, 0.192);"></div>
          <div id="Item3" class="cell1" style="background-color: rgba(200, 255, 0, 0.171);"></div>
          <div id="Item4" class="cell1" style="background-color: rgba(0, 17, 255, 0.185);"></div>
        </div>

          
        
        
        

        <div id="Pole"></div>

        <button class="back-btn" id="backButton">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" class="back-icon" style="width: 24px; height: 24px;">
            <path d="M10 9V5l-7 7 7 7v-4.1c5 0 8.5 1.6 11 5.1-1-5-4-10-11-11z"/>
          </svg>
          <span class="back-text">Back</span>
        </button>

      </div>
    </div>
  </div>
</body>


  <script type="module" src="Upgrades.js"></script>
</html>
